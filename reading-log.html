<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reading Log</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0faf5;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem 1rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #c8eed d;
      padding: 1.25rem;
      width: 100%;
      max-width: 300px;
    }
    h2 {
      font-size: 14px;
      font-weight: 600;
      color: #1a6648;
      margin-bottom: 1rem;
    }
    .form-row {
      display: flex;
      gap: 8px;
      margin-bottom: 0.75rem;
    }
    input[type="date"], input[type="number"] {
      border: 1px solid #b8e8d0;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      color: #111;
      outline: none;
      background: #f7fdf9;
      width: 100%;
    }
    input[type="number"] { width: 90px; flex-shrink: 0; }
    input:focus { border-color: #3dbd85; }
    button {
      width: 100%;
      padding: 8px;
      background: #3dbd85;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 1rem;
    }
    button:hover { background: #2fa872; }
    .log-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 200px;
      overflow-y: auto;
    }
    .log-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f0faf5;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      color: #1a6648;
    }
    .log-item .pages {
      font-weight: 600;
      color: #3dbd85;
    }
    .empty {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      padding: 1rem 0;
    }
    .total {
      font-size: 12px;
      color: #888;
      text-align: right;
      margin-top: 0.75rem;
    }
    .total span { font-weight: 600; color: #1a6648; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🌿 Daily Reading Log</h2>
    <div class="form-row">
      <input type="date" id="logDate" />
      <input type="number" id="logPages" min="1" placeholder="pages" />
    </div>
    <button onclick="addEntry()">+ Add</button>
    <div class="log-list" id="logList">
      <p class="empty" id="emptyMsg">No entries yet!</p>
    </div>
    <p class="total" id="total" style="display:none;">Total: <span id="totalPages">0</span> pages</p>
  </div>

  <script>
    const entries = JSON.parse(localStorage.getItem('readingLog') || '[]');

    function save() {
      localStorage.setItem('readingLog', JSON.stringify(entries));
    }

    function formatDate(d) {
      const [y, m, day] = d.split('-');
      return `${day}/${m}/${y}`;
    }

    function render() {
      const list = document.getElementById('logList');
      const empty = document.getElementById('emptyMsg');
      const totalEl = document.getElementById('total');
      const totalPages = document.getElementById('totalPages');

      list.innerHTML = '';

      if (entries.length === 0) {
        list.appendChild(Object.assign(document.createElement('p'), { className: 'empty', textContent: 'No entries yet!' }));
        totalEl.style.display = 'none';
        return;
      }

      const sorted = [...entries].sort((a, b) => b.date.localeCompare(a.date));
      sorted.forEach(e => {
        const item = document.createElement('div');
        item.className = 'log-item';
        item.innerHTML = `<span>${formatDate(e.date)}</span><span class="pages">${e.pages} pages</span>`;
        list.appendChild(item);
      });

      const total = entries.reduce((s, e) => s + e.pages, 0);
      totalPages.textContent = total;
      totalEl.style.display = 'block';
    }

    function addEntry() {
      const date = document.getElementById('logDate').value;
      const pages = parseInt(document.getElementById('logPages').value);
      if (!date || !pages || pages < 1) return;
      entries.push({ date, pages });
      save();
      render();
      document.getElementById('logPages').value = '';
    }

    const today = new Date().toISOString().split('T')[0];
    document.getElementById('logDate').value = today;
    render();
  </script>
</body>
</html>
