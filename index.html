<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reading Goal 2026</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      text-align: center;
      padding: 2rem;
      width: 340px;
    }
    h2 {
      font-size: 16px;
      font-weight: 600;
      color: #111;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 1.5rem;
    }
    .chart-wrap {
      position: relative;
      width: 220px;
      height: 220px;
      margin: 0 auto 1.5rem;
    }
    .center-label {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
    }
    .center-label .pct {
      font-size: 28px;
      font-weight: 700;
      color: #111;
      line-height: 1;
    }
    .center-label .pct-label {
      font-size: 11px;
      color: #aaa;
      margin-top: 2px;
    }
    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      font-size: 12px;
      color: #555;
    }
    .legend span {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>2026 Reading Goal</h2>
    <p class="subtitle">7 of 30 books read</p>
    <div class="chart-wrap">
      <canvas id="chart"></canvas>
      <div class="center-label">
        <div class="pct">23%</div>
        <div class="pct-label">complete</div>
      </div>
    </div>
    <div class="legend">
      <span><span class="dot" style="background:#7F77DD;"></span>Read (7)</span>
      <span><span class="dot" style="background:#E8E6F0;"></span>Remaining (23)</span>
    </div>
  </div>

  <script>
    new Chart(document.getElementById('chart'), {
      type: 'doughnut',
      data: {
        datasets: [{
          data: [7, 23],
          backgroundColor: ['#7F77DD', '#E8E6F0'],
          borderWidth: 0,
          hoverOffset: 6
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '72%',
        plugins: { legend: { display: false }, tooltip: { enabled: false } }
      }
    });
  </script>
</body>
</html>
